version: '3.8'

services:
  backend:
    build: ./ecommerce-backend
    container_name: ecommerce-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_DB=your_mongodb_atlas_connection_string
      - CORS_ORIGIN=http://localhost
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./ecommerce-project
      args:
        - REACT_APP_URL_BACKEND=http://localhost/api
    container_name: ecommerce-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
